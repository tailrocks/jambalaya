name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      module:
        description: >
          Module to publish. Choose "all" to upload every module as a single
          aggregated bundle (USER_MANAGED — you still release it manually from
          the Maven Central Portal). Choose a specific module to upload only
          that artifact as its own individual bundle.
        required: true
        type: choice
        default: all
        options:
          - all
          - jambalaya-checks
          - jambalaya-checks-jooq
          - jambalaya-example-grpc-interface
          - jambalaya-example-jooq
          - jambalaya-example-kotlin-test-graphql
          - jambalaya-example-mapstruct-processors
          - jambalaya-graphql
          - jambalaya-graphql-apollo
          - jambalaya-graphql-jooq
          - jambalaya-jsr310
          - jambalaya-junit-opentelemetry
          - jambalaya-mapstruct
          - jambalaya-mapstruct-processor
          - jambalaya-micronaut-graphql
          - jambalaya-micronaut-mapstruct-protobuf
          - jambalaya-opentelemetry
          - jambalaya-protobuf
          - jambalaya-seo
          - jambalaya-tenancy
          - jambalaya-tenancy-flyway
          - jambalaya-tenancy-grpc-interface
          - jambalaya-tenancy-jooq
          - jambalaya-tenancy-junit

jobs:
  publish:
    runs-on: ubuntu-latest
    # Prevent two publish jobs from running at the same time.
    concurrency:
      group: publish
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6

      # Both cases go through the root aggregation task which holds the credentials.
      # For "all": every subproject with com.gradleup.nmcp is included automatically.
      # For a specific module: -PpublishModule limits the aggregation to that one project.
      # The bundle is queued for manual release (USER_MANAGED publishing type).
      - name: Publish all modules (aggregated bundle)
        if: ${{ inputs.module == 'all' }}
        run: ./gradlew publishAggregationToCentralPortal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Publish single module — ${{ inputs.module }}
        if: ${{ inputs.module != 'all' }}
        run: ./gradlew publishAggregationToCentralPortal -PpublishModule=${{ inputs.module }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
